##### tmux sane defaults
# This file enables terminal features that make modern TUIs (including pi,
# Neovim, fzf, etc.) behave well inside tmux.

##### Prefix / general behavior
# Use the easier-to-hit Ctrl-a as the main prefix, but keep tmux's default
# Ctrl-b as a secondary prefix for muscle memory and compatibility.
set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix

# Fast, predictable key handling. Helps Escape and Alt-key chords feel snappy.
set -s escape-time 10
set -g repeat-time 600
set -g focus-events on
set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 100000
set -g detach-on-destroy off
set -g display-time 3000

##### Terminal / colors / pi compatibility
# Prefer tmux's terminfo entry and advertise modern terminal capabilities.
set -g default-terminal "tmux-256color"
# Tell tmux that the outer terminal supports true color, then pass that through
# to apps like Neovim/fzf. This avoids the washed-out 256-color fallback palette.
set -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,*:RGB,*:hyperlinks"
set -g terminal-overrides "linux*:AX@,*:Tc"
set -g xterm-keys on
# Pi works best when tmux emits extended keys in CSI-u format.
set -g extended-keys-format csi-u

# Let programs receive focus changes and clipboard/OSC52 sequences through tmux.
# This improves modern terminal apps and coding agents such as pi.
set -g set-clipboard on
set -g allow-passthrough on

# Enable extended keys when supported by the installed tmux version.
if-shell -b 'tmux -V | awk "{ split(\$2, v, /[.]/); exit !((v[1] > 3) || (v[1] == 3 && v[2] >= 2)) }"' \
  'set -s extended-keys on; set -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title,screen*:title,rxvt*:ignorefkeys,*:RGB,*:hyperlinks,*:extkeys"'

##### Windows / panes
# Open splits in the current pane's working directory.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Easier pane navigation and resizing.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane navigation intentionally requires the prefix so tmux does not steal keys
# from Neovim, pi, shells, or other TUIs.

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Create new windows in the current path.
bind c new-window -c "#{pane_current_path}"

# Kill the current window immediately without tmux's confirmation prompt.
bind & kill-window

# Reload configuration quickly.
bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

##### Mouse / copy mode
set -g mouse on
setw -g mode-keys vi

# Vim-style copy selection. Try system clipboard integrations when available.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'command -v pbcopy >/dev/null && pbcopy || command -v wl-copy >/dev/null && wl-copy || command -v xclip >/dev/null && xclip -selection clipboard || cat >/dev/null'
bind -T copy-mode-vi Enter send -X copy-selection-and-cancel

##### Status line
set -g status on
set -g status-interval 5
set -g status-position top
set -g status-style "bg=#181825,fg=#cdd6f4"
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
setw -g window-status-format " #I:#W#{?window_flags,#{window_flags}, } "
setw -g window-status-current-format " #I:#W#{?window_flags,#{window_flags}, } "
setw -g window-status-current-style "bg=#89b4fa,fg=#11111b,bold"
set -g status-left-length 40
set -g status-right-length 100
set -g status-left "#[bold,fg=#89b4fa]#S #[default]"
set -g status-right "#[fg=#7f849c]%Y-%m-%d #[fg=#89b4fa]%H:%M "


##### Radar
unbind R
unbind F
unbind D
bind f display-menu -T "Radar" -x C -y C \
  "Open Radar" o "display-popup -w 80% -h 70% -d \"#{pane_current_path}\" -E \"/home/chris/.local/bin/radar\"" \
  "Create workstream" c "display-popup -w 80% -h 70% -d \"#{pane_current_path}\" -E \"/home/chris/.local/bin/radar create\"" \
  "Refresh tasks" r "run-shell -b \"/home/chris/.local/bin/radar refresh >/dev/null && tmux display-message 'Radar refreshed' || tmux display-message 'Radar refresh failed'\""

##### Plugins
# tmux-which-key provides a discoverable shortcut menu.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Initialize TPM. Keep this at the very bottom of the file.
run '~/.tmux/plugins/tpm/tpm'
